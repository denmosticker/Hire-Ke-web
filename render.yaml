databases:
  - name: hireke-postgres
    databaseName: hireke
    user: hireke
    plan: free

services:
  - type: web
    name: hireke
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PALPLUS_MOCK
        value: "true"
      - key: STORAGE_PROVIDER
        value: r2
      - key: HIREKE_SUPPORT_EMAIL
        value: support.hirekenya@gmail.com
      - key: HIREKE_PRIVACY_EMAIL
        value: support.hirekenya@gmail.com
      - key: HIREKE_LEGAL_EMAIL
        value: support.hirekenya@gmail.com
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: hireke-postgres
          property: connectionString
