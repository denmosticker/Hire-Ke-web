<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HireKe Policies</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="legal-body">
  <header class="legal-header">
    <a class="legal-brand" href="/"><img src="hireke-logo.png" alt="HireKe logo" /><span>HireKe</span></a>
    <nav aria-label="Policy navigation">
      <a href="/privacy">Privacy</a>
      <a href="/terms">Terms</a>
      <a href="/complaints">Complaints</a>
    </nav>
  </header>

  <main class="legal-shell">
    <aside class="legal-sidebar">
      <h2>Policies</h2>
      <div id="legal-policy-links"></div>
    </aside>
    <article class="legal-article">
      <p id="legal-status">Loading policy...</p>
      <h1 id="legal-title"></h1>
      <p id="legal-summary" class="legal-summary"></p>
      <dl class="legal-meta">
        <div><dt>Version</dt><dd id="legal-version"></dd></div>
        <div><dt>Effective</dt><dd id="legal-effective"></dd></div>
        <div><dt>Last updated</dt><dd id="legal-updated"></dd></div>
      </dl>
      <nav id="legal-toc" class="legal-toc" aria-label="Table of contents"></nav>
      <div id="legal-sections"></div>
      <form id="complaint-form" class="legal-complaint-form hidden">
        <h2>Submit a complaint</h2>
        <div class="input-group"><label for="complaint-category">Category</label><select id="complaint-category"><option>general</option><option>privacy</option><option>payment</option><option>fake_opportunity</option><option>harassment</option><option>copyright_ip</option><option>ai_matching</option><option>account_appeal</option></select></div>
        <div class="input-group"><label for="complaint-name">Name</label><input id="complaint-name" type="text" /></div>
        <div class="input-group"><label for="complaint-email">Email</label><input id="complaint-email" type="email" required /></div>
        <div class="input-group"><label for="complaint-subject">Subject</label><input id="complaint-subject" type="text" required /></div>
        <div class="input-group"><label for="complaint-message">Message</label><textarea id="complaint-message" required></textarea></div>
        <div class="input-group"><label for="complaint-url">Related URL</label><input id="complaint-url" type="url" /></div>
        <button id="complaint-submit" class="primary-btn loading-btn" type="submit"><span class="btn-label">Submit complaint</span><span class="btn-spinner" aria-hidden="true"></span></button>
        <p id="complaint-status" class="hk-form-status" role="status"></p>
      </form>
    </article>
  </main>

  <script src="legal-page.js"></script>
</body>
</html>
